name: CI

on:
  push:
    branches: [ main, develop, 'release/**' ]
  pull_request:
    branches: [ main, develop, 'release/**' ]

permissions:
  contents: read
  pull-requests: read

jobs:
  # Detect which files changed to conditionally run expensive CI jobs
  changes:
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
      tcp_benchmark: ${{ steps.filter.outputs.tcp_benchmark }}
    steps:
    - name: Checkout repository
      uses: actions/checkout@v7

    - name: Check for code changes
      uses: dorny/paths-filter@v4
      id: filter
      with:
        filters: |
          code:
            - 'include/**'
            - 'tests/**'
            - 'examples/**'
            - 'CMakeLists.txt'
            - '*.cmake'
            - 'cmake/**'
            - 'tools/**'
            - '.github/workflows/**'
          tcp_benchmark:
            - 'include/**'
            - 'examples/bench_tcp_*.cpp'
            - 'examples/bench_tcp_common.hpp'
            - 'examples/CMakeLists.txt'
            - 'CMakeLists.txt'
            - '*.cmake'
            - 'cmake/**'
            - '.github/workflows/**'

  build-and-test:
    needs: changes
    strategy:
      fail-fast: false
      matrix:
        build_type: [Release, Debug]
        arch:
          - { name: x64, runner: ubuntu-24.04 }
          - { name: arm64, runner: ubuntu-24.04-arm }

    runs-on: ${{ matrix.arch.runner }}
    name: ${{ matrix.arch.name }}-${{ matrix.build_type }}

    steps:
    - name: Skip non-code changes
      if: needs.changes.outputs.code != 'true'
      run: echo "No code changes detected; CI matrix job intentionally skipped."

    - name: Checkout repository
      if: needs.changes.outputs.code == 'true'
      uses: actions/checkout@v7

    - name: Install dependencies
      if: needs.changes.outputs.code == 'true'
      run: |
        sudo tee /etc/apt/apt.conf.d/99-elio-ci-network >/dev/null <<'APT'
        Acquire::Retries "5";
        Acquire::http::Timeout "30";
        Acquire::https::Timeout "30";
        Acquire::ForceIPv4 "true";
        APT

        retry_sudo() {
          for attempt in 1 2 3 4 5; do
            if sudo "$@"; then
              return 0
            fi
            if [[ "${attempt}" == 5 ]]; then
              return 1
            fi
            sleep $((attempt * 5))
          done
        }

        retry_sudo apt-get update
        retry_sudo apt-get install -y \
          cmake \
          ninja-build \
          liburing-dev \
          libssl-dev \
          g++-14

    - name: Configure CMake
      if: needs.changes.outputs.code == 'true'
      run: |
        cmake -B build -G Ninja \
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
          -DCMAKE_C_COMPILER=gcc-14 \
          -DCMAKE_CXX_COMPILER=g++-14 \
          -DELIO_BUILD_TESTS=ON \
          -DELIO_BUILD_SANITIZER_TESTS=${{ matrix.build_type == 'Debug' && 'ON' || 'OFF' }} \
          -DELIO_BUILD_EXAMPLES=ON \
          -DELIO_ENABLE_TLS=ON \
          -DELIO_ENABLE_HTTP=ON \
          -DELIO_ENABLE_HTTP2=ON

    - name: Build
      if: needs.changes.outputs.code == 'true'
      run: cmake --build build --parallel

    - name: Run unit tests
      if: needs.changes.outputs.code == 'true'
      run: ./build/tests/elio_tests

    - name: Run ASAN tests
      if: needs.changes.outputs.code == 'true' && matrix.build_type == 'Debug'
      run: ./build/tests/elio_tests_asan
      env:
        ASAN_OPTIONS: detect_leaks=1:abort_on_error=1

    - name: Run TSAN tests
      if: needs.changes.outputs.code == 'true' && matrix.build_type == 'Debug'
      run: ./build/tests/elio_tests_tsan
      env:
        TSAN_OPTIONS: halt_on_error=1:second_deadlock_stack=1

    - name: Run registered CTest checks
      if: needs.changes.outputs.code == 'true' && matrix.arch.name == 'x64' && matrix.build_type == 'Debug'
      run: |
        required_ctest_checks=(
          package_rdma_cuda_export_metadata
          rdma_cuda_example_api_metadata
          package_liburing_export_metadata
          package_threads_export_metadata
          package_rdma_dependency_export_metadata
          package_elio_compile_feature_export
          http2_fetchcontent_cache_scope
          http2_option_requires_http
          package_version_compatibility
          non_linux_platform_rejected
        )

        ctest --test-dir build -N
        for check_name in "${required_ctest_checks[@]}"; do
          if ! ctest --test-dir build -N -R "^${check_name}$" | grep -q "${check_name}"; then
            echo "::error title=Missing CTest check::${check_name} is not registered"
            exit 1
          fi
        done

        ctest --test-dir build --output-on-failure \
          -R "^(package_rdma_cuda_export_metadata|rdma_cuda_example_api_metadata|package_liburing_export_metadata|package_threads_export_metadata|package_rdma_dependency_export_metadata|package_elio_compile_feature_export|http2_fetchcontent_cache_scope|http2_option_requires_http|package_version_compatibility|non_linux_platform_rejected)$"

        for test_binary in \
          ./build/tests/elio_rdma_cuda_lifetime_tests \
          ./build/tests/elio_rdma_ibverbs_backend_stub_tests; do
          if [[ ! -x "${test_binary}" ]]; then
            echo "::error title=Missing test binary::${test_binary} was not built"
            exit 1
          fi
          "${test_binary}"
        done

    - name: Run benchmark
      if: needs.changes.outputs.code == 'true' && matrix.build_type == 'Release'
      run: timeout --kill-after=10s 5m ./build/examples/benchmark

    - name: Run channel benchmark
      if: needs.changes.outputs.code == 'true' && matrix.build_type == 'Release'
      run: timeout --kill-after=10s 5m ./build/examples/bench_channel

  package-consumer-check:
    needs: changes
    runs-on: ubuntu-24.04
    name: package-consumer-check

    steps:
    - name: Skip non-code changes
      if: needs.changes.outputs.code != 'true'
      run: echo "No code changes detected; package consumer check intentionally skipped."

    - name: Checkout repository
      if: needs.changes.outputs.code == 'true'
      uses: actions/checkout@v7

    - name: Install dependencies
      if: needs.changes.outputs.code == 'true'
      run: |
        sudo tee /etc/apt/apt.conf.d/99-elio-ci-network >/dev/null <<'APT'
        Acquire::Retries "5";
        Acquire::http::Timeout "30";
        Acquire::https::Timeout "30";
        Acquire::ForceIPv4 "true";
        APT

        retry_sudo() {
          for attempt in 1 2 3 4 5; do
            if sudo "$@"; then
              return 0
            fi
            if [[ "${attempt}" == 5 ]]; then
              return 1
            fi
            sleep $((attempt * 5))
          done
        }

        retry_sudo apt-get update
        retry_sudo apt-get install -y \
          cmake \
          ninja-build \
          liburing-dev \
          libssl-dev \
          libnghttp2-dev \
          g++-14

    - name: Configure CMake (installable build)
      if: needs.changes.outputs.code == 'true'
      run: |
        cmake -B build -G Ninja \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_C_COMPILER=gcc-14 \
          -DCMAKE_CXX_COMPILER=g++-14 \
          -DELIO_BUILD_TESTS=OFF \
          -DELIO_BUILD_EXAMPLES=OFF \
          -DELIO_ENABLE_TLS=ON \
          -DELIO_ENABLE_HTTP=ON \
          -DELIO_ENABLE_HTTP2=ON

    - name: Build and install
      if: needs.changes.outputs.code == 'true'
      run: |
        cmake --build build --parallel
        cmake --install build --prefix ${{ github.workspace }}/_install

    - name: Verify package version compatibility
      if: needs.changes.outputs.code == 'true'
      run: |
        cmake \
          -DELIO_VERSION_FILE=${{ github.workspace }}/_install/lib/cmake/Elio/ElioConfigVersion.cmake \
          -P tests/cmake/check_elio_version_compatibility.cmake

    - name: Verify downstream consumption
      if: needs.changes.outputs.code == 'true'
      run: |
        mkdir -p consumer
        cat > consumer/CMakeLists.txt << 'EOF'
        cmake_minimum_required(VERSION 3.20)
        project(ElioConsumer LANGUAGES CXX)
        set(CMAKE_CXX_STANDARD 20)

        find_package(Elio REQUIRED)

        add_executable(consumer main.cpp)
        foreach(required_target IN ITEMS
            Elio::elio_tls
            Elio::elio_http
            Elio::elio_http2)
          if(NOT TARGET ${required_target})
            message(FATAL_ERROR "Expected installed target ${required_target}")
          endif()
        endforeach()

        target_link_libraries(consumer PRIVATE
          Elio::elio
          Elio::elio_tls
          Elio::elio_http
          Elio::elio_http2)
        target_compile_definitions(consumer PRIVATE
          ELIO_HAS_TLS_TARGET=1
          ELIO_HAS_HTTP_TARGET=1
          ELIO_HAS_HTTP2_TARGET=1)
        EOF

        cat > consumer/main.cpp << 'EOF'
        #include <elio/elio.hpp>
        #if defined(ELIO_HAS_TLS_TARGET)
        #include <elio/tls/tls.hpp>
        #endif
        #if defined(ELIO_HAS_HTTP_TARGET)
        #include <elio/http/http.hpp>
        #endif
        #if defined(ELIO_HAS_HTTP2_TARGET)
        #include <elio/http/http2.hpp>
        #endif

        int main() {
            return 0;
        }
        EOF

        cmake -S consumer -B consumer/build -G Ninja \
          -DCMAKE_CXX_COMPILER=g++-14 \
          -DCMAKE_PREFIX_PATH=${{ github.workspace }}/_install
        cmake --build consumer/build --parallel

  tcp-benchmark-compile:
    needs: changes
    runs-on: ubuntu-24.04
    name: tcp-benchmark-compile
    timeout-minutes: 15

    steps:
    - name: Skip TCP benchmark compile
      if: needs.changes.outputs.tcp_benchmark != 'true'
      run: echo "No TCP benchmark-affecting changes detected; compile check intentionally skipped."

    - name: Checkout repository
      if: needs.changes.outputs.tcp_benchmark == 'true'
      uses: actions/checkout@v7

    - name: Install dependencies
      if: needs.changes.outputs.tcp_benchmark == 'true'
      run: |
        sudo tee /etc/apt/apt.conf.d/99-elio-ci-network >/dev/null <<'APT'
        Acquire::Retries "5";
        Acquire::http::Timeout "30";
        Acquire::https::Timeout "30";
        Acquire::ForceIPv4 "true";
        APT

        retry_sudo() {
          for attempt in 1 2 3 4 5; do
            if sudo "$@"; then
              return 0
            fi
            if [[ "${attempt}" == 5 ]]; then
              return 1
            fi
            sleep $((attempt * 5))
          done
        }

        retry_sudo apt-get update
        retry_sudo apt-get install -y \
          cmake \
          ninja-build \
          liburing-dev \
          libuv1-dev \
          g++-14

    - name: Configure TCP benchmark build
      if: needs.changes.outputs.tcp_benchmark == 'true'
      run: |
        cmake -B build-tcp-benchmark -G Ninja \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_C_COMPILER=gcc-14 \
          -DCMAKE_CXX_COMPILER=g++-14 \
          -DELIO_BUILD_TESTS=OFF \
          -DELIO_BUILD_EXAMPLES=ON \
          -DELIO_ENABLE_TLS=OFF \
          -DELIO_ENABLE_HTTP=OFF \
          -DELIO_ENABLE_HTTP2=OFF \
          -DELIO_BUILD_TCP_BENCHMARKS=ON

    - name: Build TCP benchmark targets
      if: needs.changes.outputs.tcp_benchmark == 'true'
      run: |
        cmake --build build-tcp-benchmark \
          --target bench_tcp_elio bench_tcp_libuv bench_tcp_asio \
          --parallel 2

    - name: Run Elio TCP benchmark smoke
      if: needs.changes.outputs.tcp_benchmark == 'true'
      shell: bash
      run: |
        set -euo pipefail

        port="$(python3 -c 'import socket; s = socket.socket(socket.AF_INET, socket.SOCK_STREAM); s.bind(("127.0.0.1", 0)); print(s.getsockname()[1]); s.close()')"

        server_log="elio_tcp_smoke_server.log"
        server_pid=""

        cleanup_server() {
          if [[ -n "${server_pid}" ]] && kill -0 "${server_pid}" 2>/dev/null; then
            kill "${server_pid}" 2>/dev/null || true
            for _ in {1..20}; do
              if ! kill -0 "${server_pid}" 2>/dev/null; then
                wait "${server_pid}" 2>/dev/null || true
                return 0
              fi
              sleep 0.2
            done
            kill -9 "${server_pid}" 2>/dev/null || true
          fi
          if [[ -n "${server_pid}" ]]; then
            wait "${server_pid}" 2>/dev/null || true
          fi
        }

        trap cleanup_server EXIT

        ./build-tcp-benchmark/examples/bench_tcp_elio \
          -s -p "${port}" >"${server_log}" 2>&1 &
        server_pid=$!

        server_ready=0
        for _ in {1..40}; do
          if ! kill -0 "${server_pid}" 2>/dev/null; then
            wait "${server_pid}" 2>/dev/null || true
            echo "::error::Elio TCP benchmark smoke server exited early"
            cat "${server_log}" || true
            exit 1
          fi
          if (: > "/dev/tcp/127.0.0.1/${port}") >/dev/null 2>&1; then
            server_ready=1
            break
          fi
          sleep 0.25
        done

        if (( server_ready == 0 )); then
          echo "::error::Elio TCP benchmark smoke server did not accept connections on port ${port}"
          cat "${server_log}" || true
          exit 1
        fi

        timeout --kill-after=5s 90s \
          ./build-tcp-benchmark/examples/bench_tcp_elio \
            -c -H 127.0.0.1 -p "${port}" -d 1 -w 0 -m pingpong
