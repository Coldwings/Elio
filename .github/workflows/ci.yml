name: CI

on:
  push:
    branches: [ main, develop, 'release/**' ]
  pull_request:
    branches: [ main, develop, 'release/**' ]

permissions:
  contents: read

jobs:
  # Detect which files changed to conditionally run expensive CI jobs
  changes:
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
    - name: Checkout repository
      uses: actions/checkout@v7

    - name: Check for code changes
      uses: dorny/paths-filter@v4
      id: filter
      with:
        filters: |
          code:
            - 'include/**'
            - 'tests/**'
            - 'examples/**'
            - 'CMakeLists.txt'
            - '*.cmake'
            - 'cmake/**'

  build-and-test:
    needs: changes
    strategy:
      fail-fast: false
      matrix:
        build_type: [Release, Debug]
        arch:
          - { name: x64, runner: ubuntu-24.04 }
          - { name: arm64, runner: ubuntu-24.04-arm }

    runs-on: ${{ matrix.arch.runner }}
    name: ${{ matrix.arch.name }}-${{ matrix.build_type }}

    steps:
    - name: Skip non-code changes
      if: needs.changes.outputs.code != 'true'
      run: echo "No code changes detected; CI matrix job intentionally skipped."

    - name: Checkout repository
      if: needs.changes.outputs.code == 'true'
      uses: actions/checkout@v7

    - name: Install dependencies
      if: needs.changes.outputs.code == 'true'
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          cmake \
          ninja-build \
          liburing-dev \
          g++-14

    - name: Configure CMake
      if: needs.changes.outputs.code == 'true'
      run: |
        cmake -B build -G Ninja \
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
          -DCMAKE_C_COMPILER=gcc-14 \
          -DCMAKE_CXX_COMPILER=g++-14 \
          -DELIO_BUILD_TESTS=ON \
          -DELIO_BUILD_EXAMPLES=ON \
          -DELIO_ENABLE_TLS=ON \
          -DELIO_ENABLE_HTTP=ON \
          -DELIO_ENABLE_HTTP2=ON

    - name: Build
      if: needs.changes.outputs.code == 'true'
      run: cmake --build build --parallel

    - name: Run unit tests
      if: needs.changes.outputs.code == 'true'
      run: ./build/tests/elio_tests

    - name: Run ASAN tests
      if: needs.changes.outputs.code == 'true' && matrix.build_type == 'Debug'
      run: ./build/tests/elio_tests_asan
      env:
        ASAN_OPTIONS: detect_leaks=1:abort_on_error=1

    - name: Run TSAN tests
      if: needs.changes.outputs.code == 'true' && matrix.build_type == 'Debug'
      run: ./build/tests/elio_tests_tsan
      env:
        TSAN_OPTIONS: halt_on_error=1:second_deadlock_stack=1

    - name: Run benchmark
      if: needs.changes.outputs.code == 'true' && matrix.build_type == 'Release'
      run: ./build/examples/benchmark

    - name: Run channel benchmark
      if: needs.changes.outputs.code == 'true' && matrix.build_type == 'Release'
      run: ./build/examples/bench_channel

  package-consumer-check:
    needs: changes
    runs-on: ubuntu-24.04
    name: package-consumer-check

    steps:
    - name: Skip non-code changes
      if: needs.changes.outputs.code != 'true'
      run: echo "No code changes detected; package consumer check intentionally skipped."

    - name: Checkout repository
      if: needs.changes.outputs.code == 'true'
      uses: actions/checkout@v7

    - name: Install dependencies
      if: needs.changes.outputs.code == 'true'
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          cmake \
          ninja-build \
          liburing-dev \
          libssl-dev \
          libnghttp2-dev \
          g++-14

    - name: Configure CMake (installable build)
      if: needs.changes.outputs.code == 'true'
      run: |
        cmake -B build -G Ninja \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_C_COMPILER=gcc-14 \
          -DCMAKE_CXX_COMPILER=g++-14 \
          -DELIO_BUILD_TESTS=OFF \
          -DELIO_BUILD_EXAMPLES=OFF \
          -DELIO_ENABLE_TLS=ON \
          -DELIO_ENABLE_HTTP=ON \
          -DELIO_ENABLE_HTTP2=ON

    - name: Build and install
      if: needs.changes.outputs.code == 'true'
      run: |
        cmake --build build --parallel
        cmake --install build --prefix ${{ github.workspace }}/_install

    - name: Verify downstream consumption
      if: needs.changes.outputs.code == 'true'
      run: |
        mkdir -p consumer
        cat > consumer/CMakeLists.txt << 'EOF'
        cmake_minimum_required(VERSION 3.20)
        project(ElioConsumer LANGUAGES CXX)
        set(CMAKE_CXX_STANDARD 20)

        find_package(Elio REQUIRED)

        add_executable(consumer main.cpp)
        target_link_libraries(consumer PRIVATE Elio::elio)

        if(TARGET Elio::elio_tls)
          target_link_libraries(consumer PRIVATE Elio::elio_tls)
          target_compile_definitions(consumer PRIVATE ELIO_HAS_TLS_TARGET=1)
        endif()

        if(TARGET Elio::elio_http)
          target_link_libraries(consumer PRIVATE Elio::elio_http)
          target_compile_definitions(consumer PRIVATE ELIO_HAS_HTTP_TARGET=1)
        endif()

        if(TARGET Elio::elio_http2)
          target_link_libraries(consumer PRIVATE Elio::elio_http2)
          target_compile_definitions(consumer PRIVATE ELIO_HAS_HTTP2_TARGET=1)
        endif()
        EOF

        cat > consumer/main.cpp << 'EOF'
        #include <elio/elio.hpp>
        #if defined(ELIO_HAS_TLS_TARGET)
        #include <elio/tls/tls.hpp>
        #endif
        #if defined(ELIO_HAS_HTTP_TARGET)
        #include <elio/http/http.hpp>
        #endif
        #if defined(ELIO_HAS_HTTP2_TARGET)
        #include <elio/http/http2.hpp>
        #endif

        int main() {
            return 0;
        }
        EOF

        cmake -S consumer -B consumer/build -G Ninja \
          -DCMAKE_CXX_COMPILER=g++-14 \
          -DCMAKE_PREFIX_PATH=${{ github.workspace }}/_install
        cmake --build consumer/build --parallel
